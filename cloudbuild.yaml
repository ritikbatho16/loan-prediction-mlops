steps:
# Step 1: Docker image build karna
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/neural-quarter-490713-b0/ml-repo/loan-trainer:latest', '.']

# Step 2: Image ko Artifact Registry mein push karna
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/neural-quarter-490713-b0/ml-repo/loan-trainer:latest']

# Step 3: Vertex AI par Training Job create karna
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'gcloud'
  args: 
    - 'ai'
    - 'custom-jobs'
    - 'create'
    - '--region=us-central1'
    - '--display-name=loan-prediction-train'
    - '--worker-pool-spec=machine-type=n1-standard-4,container-image-uri=us-central1-docker.pkg.dev/neural-quarter-490713-b0/ml-repo/loan-trainer:latest'
    - '--args=--bucket_name=$_BUCKET_NAME'

substitutions:
  _BUCKET_NAME: "my-mlops-bucket-ritik"